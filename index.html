<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code WebAR Experience</title>
    <!-- Include A-Frame Boilerplate Library -->
    <script src="https://aframe.io"></script>
    <!-- Include AR.js Tracking Library for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Initialize AR scene with marker tracking capabilities -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Define assets to cache and preload safely -->
        <a-assets>
            <!-- You can replace the box with a 3D model .gltf later -->
        </a-assets>

        <!-- Point directly to your compiled tracking pattern file -->
        <a-marker type="pattern" url="pattern-qr.patt">
            <!-- Render a standard neon blue 3D cube over the QR code -->
            <a-box position="0 0.5 0" 
                   material="color: #00E5FF; opacity: 0.9;" 
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
            </a-box>
        </a-marker>

        <!-- Provide a static fall-back camera matrix required for scene rendering -->
        

    </a-scene>

</body>
</html>
